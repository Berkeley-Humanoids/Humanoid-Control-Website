  <rect x="22" y="26" width="20" height="22" rx="3" fill="#FDB515"/>
  <!-- Arms -->
  <rect x="14" y="28" width="6" height="16" rx="3" fill="#FDB515"/>
  <rect x="44" y="28" width="6" height="16" rx="3" fill="#FDB515"/>
