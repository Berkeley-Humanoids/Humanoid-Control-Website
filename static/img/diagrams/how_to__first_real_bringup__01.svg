<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 580"
     width="980" height="580" font-family="ui-monospace, Menlo, Consolas, Courier, monospace"
     font-size="13" fill="#111111" text-rendering="geometricPrecision">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
<text x="20" y="30" font-size="15" font-weight="700" text-anchor="start" fill="#111111" dominant-baseline="middle">Lite real-hardware bringup</text>
<text x="20" y="48" font-size="11" font-weight="400" text-anchor="start" fill="#888888" dominant-baseline="middle">What happens between `pixi run launch-real` and `ZERO_TORQUE active`</text><text x="80" y="64" font-size="12" font-weight="600" text-anchor="middle" fill="#888888" dominant-baseline="middle">operator</text><line x1="80" y1="70" x2="80" y2="550" stroke="#888888" stroke-width="1.4" stroke-dasharray="3 3"/><text x="240" y="64" font-size="12" font-weight="600" text-anchor="middle" fill="#888888" dominant-baseline="middle">launch</text><line x1="240" y1="70" x2="240" y2="550" stroke="#888888" stroke-width="1.4" stroke-dasharray="3 3"/><text x="420" y="64" font-size="12" font-weight="600" text-anchor="middle" fill="#cc4a1f" dominant-baseline="middle">ros2_control_node</text><line x1="420" y1="70" x2="420" y2="550" stroke="#ff6633" stroke-width="1.4" stroke-dasharray="3 3"/><text x="600" y="64" font-size="12" font-weight="600" text-anchor="middle" fill="#3B7A57" dominant-baseline="middle">RobstrideSystem</text><line x1="600" y1="70" x2="600" y2="550" stroke="#3B7A57" stroke-width="1.4" stroke-dasharray="3 3"/><text x="780" y="64" font-size="12" font-weight="600" text-anchor="middle" fill="#5f6671" dominant-baseline="middle">mode_manager</text><line x1="780" y1="70" x2="780" y2="550" stroke="#5f6671" stroke-width="1.4" stroke-dasharray="3 3"/><line x1="80" y1="110" x2="240" y2="110" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="94" y="83" width="132" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="160" y="92" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">pixi run launch-real</text><line x1="240" y1="140" x2="80" y2="140" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><rect x="94" y="113" width="132" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="160" y="122" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">(can interfaces UP?)</text><line x1="80" y1="170" x2="80" y2="170" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><rect x="-13" y="143" width="186" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="80" y="152" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">ip link set can0/1 up @ 1Mbit</text><line x1="240" y1="210" x2="420" y2="210" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="255" y="183" width="150" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="330" y="192" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">spawn ros2_control_node</text><line x1="420" y1="240" x2="600" y2="240" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="408" y="213" width="204" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="510" y="222" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">load RobstrideSystem (pluginlib)</text><line x1="600" y1="270" x2="600" y2="270" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="522" y="243" width="156" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="600" y="252" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">open can0 + can1 sockets</text><line x1="600" y1="300" x2="600" y2="300" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="531" y="273" width="138" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="600" y="282" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">load calibration.json</text><line x1="600" y1="330" x2="600" y2="330" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="528" y="303" width="144" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="600" y="312" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">I/O threads up (epoll)</text><line x1="240" y1="360" x2="420" y2="360" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="210" y="333" width="240" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="330" y="342" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">spawn joint_state_broadcaster (active)</text><line x1="240" y1="390" x2="420" y2="390" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="246" y="363" width="168" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="330" y="372" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">spawn zero_torque (active)</text><line x1="240" y1="420" x2="420" y2="420" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="198" y="393" width="264" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="330" y="402" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">spawn damping/standby/rl/remote (inactive)</text><line x1="240" y1="460" x2="780" y2="460" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="450" y="433" width="120" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="510" y="442" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">start mode_manager</text><line x1="780" y1="490" x2="420" y2="490" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="486" y="463" width="228" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="600" y="472" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">switch_controller(zero_torque, asap)</text><line x1="780" y1="520" x2="420" y2="520" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="504" y="493" width="192" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="600" y="502" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">subscribe /safety_status, /joy</text><text x="490" y="565" font-size="12" font-weight="600" text-anchor="middle" fill="#cc4a1f" dominant-baseline="middle">After this sequence: motors compliant, /joint_states @ 50 Hz, /control_mode publishes ZERO_TORQUE.</text></svg>
