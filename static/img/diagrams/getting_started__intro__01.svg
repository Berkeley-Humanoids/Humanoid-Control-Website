<rect x="585" y="330" width="80" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="625" y="338" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">MIT-mode CAN</text><line x1="560" y1="130" x2="635" y2="130" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/>
<rect x="566" y="110" width="62" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="597" y="118" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">/imu/data</text><line x1="690" y1="260" x2="690" y2="280" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="820" y1="260" x2="820" y2="280" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/></svg>
