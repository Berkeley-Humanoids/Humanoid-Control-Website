<text x="322" y="76" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">Onboard PC (PREEMPT_RT)</text><rect x="610" y="60" width="290" height="360" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="622" y="76" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">Robot (Lite shown)</text><rect x="50" y="100" width="210" height="50" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
