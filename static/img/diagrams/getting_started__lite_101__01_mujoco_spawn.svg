<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540"
     width="920" height="540" font-family="ui-monospace, Menlo, Consolas, Courier, monospace"
     font-size="13" fill="#111111" text-rendering="geometricPrecision">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
<text x="20" y="30" font-size="15" font-weight="700" text-anchor="start" fill="#111111" dominant-baseline="middle">MuJoCo bringup spawn sequence</text>
<text x="20" y="48" font-size="11" font-weight="400" text-anchor="start" fill="#888888" dominant-baseline="middle">What happens when you run `ros2 launch humanoid_bringup_lite mujoco.launch.py`</text><text x="100" y="74" font-size="12" font-weight="600" text-anchor="middle" fill="#888888" dominant-baseline="middle">launch</text><line x1="100" y1="80" x2="100" y2="510" stroke="#888888" stroke-width="1.4" stroke-dasharray="3 3"/><text x="280" y="74" font-size="12" font-weight="600" text-anchor="middle" fill="#888888" dominant-baseline="middle">xacro</text><line x1="280" y1="80" x2="280" y2="510" stroke="#888888" stroke-width="1.4" stroke-dasharray="3 3"/><text x="460" y="74" font-size="12" font-weight="600" text-anchor="middle" fill="#cc4a1f" dominant-baseline="middle">mujoco_sim</text><line x1="460" y1="80" x2="460" y2="510" stroke="#ff6633" stroke-width="1.4" stroke-dasharray="3 3"/><text x="640" y="74" font-size="12" font-weight="600" text-anchor="middle" fill="#cc4a1f" dominant-baseline="middle">controller_manager</text><line x1="640" y1="80" x2="640" y2="510" stroke="#ff6633" stroke-width="1.4" stroke-dasharray="3 3"/><text x="820" y="74" font-size="12" font-weight="600" text-anchor="middle" fill="#5f6671" dominant-baseline="middle">mode_manager</text><line x1="820" y1="80" x2="820" y2="510" stroke="#5f6671" stroke-width="1.4" stroke-dasharray="3 3"/><line x1="100" y1="120" x2="280" y2="120" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="100" y="93" width="180" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="190" y="102" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">expand xacro (use_sim:=true)</text><line x1="280" y1="150" x2="100" y2="150" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="172" y="123" width="36" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="190" y="132" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">URDF</text><line x1="100" y1="180" x2="460" y2="180" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="226" y="153" width="108" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="280" y="162" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">start mujoco_sim</text><line x1="460" y1="210" x2="640" y2="210" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="460" y="183" width="180" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="550" y="192" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">load MujocoRos2ControlPlugin</text><line x1="640" y1="240" x2="640" y2="240" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><rect x="535" y="213" width="210" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="640" y="222" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">register MujocoSystem (17 joints)</text><line x1="100" y1="280" x2="640" y2="280" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="310" y="253" width="120" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="370" y="262" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">spawn jsb (active)</text><line x1="100" y1="310" x2="640" y2="310" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="286" y="283" width="168" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="370" y="292" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">spawn zero_torque (active)</text><line x1="100" y1="340" x2="640" y2="340" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="289" y="313" width="162" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="370" y="322" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">spawn 4 others (inactive)</text><line x1="100" y1="380" x2="820" y2="380" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="400" y="353" width="120" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="460" y="362" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">start mode_manager</text><line x1="820" y1="410" x2="640" y2="410" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="634" y="383" width="192" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="730" y="392" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">switch_controller(zero_torque)</text><text x="460" y="460" font-size="12" font-weight="600" text-anchor="middle" fill="#cc4a1f" dominant-baseline="middle">System is now at ZERO_TORQUE, publishing /joint_states at 50 Hz</text></svg>
