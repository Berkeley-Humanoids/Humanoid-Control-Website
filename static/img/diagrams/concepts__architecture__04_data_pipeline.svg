<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 560"
     width="1020" height="560" font-family="ui-monospace, Menlo, Consolas, Courier, monospace"
     font-size="13" fill="#111111" text-rendering="geometricPrecision">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
<text x="20" y="30" font-size="15" font-weight="700" text-anchor="start" fill="#111111" dominant-baseline="middle">RT data pipeline — one tick (read -> update -> write)</text>
<text x="20" y="48" font-size="11" font-weight="400" text-anchor="start" fill="#888888" dominant-baseline="middle">Where CAN frames live before they reach a controller, and how commands get back out</text><line x1="540" y1="60" x2="540" y2="500" stroke="#A00000" stroke-width="2" stroke-dasharray="6 4"/><text x="540" y="75" font-size="11" font-weight="600" text-anchor="middle" fill="#A00000" dominant-baseline="middle">RT boundary</text><rect x="40" y="90" width="470" height="200" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="52" y="106" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">I/O thread (non-RT, blocking syscalls OK)</text><rect x="60" y="130" width="130" height="50" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="125" y="147" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">kernel CAN</text>
<text x="125" y="165" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">can0 / can1</text><rect x="220" y="110" width="130" height="40" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="285" y="130" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">epoll_wait</text>
<rect x="220" y="165" width="130" height="40" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="285" y="185" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">decode frame</text>
<rect x="220" y="230" width="130" height="40" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="285" y="250" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">encode frame</text>
<rect x="380" y="130" width="120" height="50" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
<text x="440" y="146" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">RX ring</text>
<text x="440" y="163" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">(SPSC, 256)</text>
<rect x="380" y="220" width="120" height="50" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
<text x="440" y="236" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">TX ring</text>
<text x="440" y="253" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">(SPSC, 64)</text>
<line x1="190" y1="150" x2="220" y2="130" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="285" y1="150" x2="285" y2="165" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="350" y1="185" x2="380" y2="155" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="380" y1="245" x2="350" y2="250" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="285" y1="230" x2="285" y2="195" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><polyline points="220,250 140,250 140,180" fill="none" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="143" y="241" width="54" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="170" y="250" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">write()</text><rect x="560" y="90" width="440" height="200" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="572" y="106" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">controller_manager (RT, 50 Hz, no allocs)</text><rect x="580" y="110" width="170" height="40" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="665" y="130" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">RobstrideSystem.read</text>
<rect x="580" y="230" width="170" height="40" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="665" y="250" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">RobstrideSystem.write</text>
<rect x="790" y="110" width="190" height="40" rx="6" ry="6" fill="#EEEEEE" stroke="#888888" stroke-width="1.5"/>
<text x="885" y="122" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">state_interfaces</text>
<text x="885" y="140" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">q, qd, tau</text><rect x="790" y="230" width="190" height="40" rx="6" ry="6" fill="#EEEEEE" stroke="#888888" stroke-width="1.5"/>
<text x="885" y="242" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">command_interfaces</text>
<text x="885" y="260" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">q_cmd, qd_cmd, tau, K, D</text><rect x="680" y="170" width="200" height="40" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
<text x="780" y="190" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">controller.update()</text>
<line x1="750" y1="130" x2="790" y2="130" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="790" y1="130" x2="780" y2="170" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="780" y1="210" x2="790" y2="230" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="790" y1="250" x2="750" y2="250" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="500" y1="155" x2="580" y2="130" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="497" y="122" width="86" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="540" y="130" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">lock-free pop</text><line x1="580" y1="250" x2="500" y2="245" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="494" y="251" width="92" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="540" y="259" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">lock-free push</text><text x="660" y="100" font-size="10" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">calibration applied here</text><text x="660" y="290" font-size="10" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">calibration applied here</text><text x="510" y="360" font-size="12" font-weight="600" text-anchor="middle" fill="#003262" dominant-baseline="middle">The I/O thread is the only place that touches the kernel CAN socket. Lock-free SPSC rings cross the RT boundary in both directions.</text><text x="510" y="385" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">Calibration (direction, homing_offset) is applied inside read()/write() so controllers see joint frame, never the raw encoder.</text><rect x="40" y="430" width="470" height="90" rx="8" ry="8" fill="#E7F0FF" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="52" y="446" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">Timing</text><text x="60" y="460" font-size="11" font-weight="600" text-anchor="start" fill="#003262" dominant-baseline="middle">I/O thread:</text><text x="150" y="460" font-size="11" font-weight="400" text-anchor="start" fill="#111111" dominant-baseline="middle">syscall-blocked on epoll_wait; drains kernel at line rate.</text><text x="60" y="482" font-size="11" font-weight="600" text-anchor="start" fill="#003262" dominant-baseline="middle">RT thread:</text><text x="150" y="482" font-size="11" font-weight="400" text-anchor="start" fill="#111111" dominant-baseline="middle">20 ms tick. read() = pop ring head, no syscalls.</text><text x="60" y="504" font-size="11" font-weight="600" text-anchor="start" fill="#003262" dominant-baseline="middle">Latency:</text><text x="150" y="504" font-size="11" font-weight="400" text-anchor="start" fill="#111111" dominant-baseline="middle">~1 ms wire-to-controller best case; tail bounded by SPSC depth.</text><rect x="560" y="430" width="440" height="90" rx="8" ry="8" fill="#FFE7E7" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="572" y="446" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">If a buffer fills up</text><text x="580" y="460" font-size="11" font-weight="600" text-anchor="start" fill="#A00000" dominant-baseline="middle">RX ring overflow:</text><text x="720" y="460" font-size="11" font-weight="400" text-anchor="start" fill="#111111" dominant-baseline="middle">oldest frame dropped (latest-wins).</text><text x="580" y="482" font-size="11" font-weight="600" text-anchor="start" fill="#A00000" dominant-baseline="middle">TX ring overflow:</text><text x="720" y="482" font-size="11" font-weight="400" text-anchor="start" fill="#111111" dominant-baseline="middle">write_command() returns false; flag TX_QUEUE_OVERRUN.</text><text x="580" y="504" font-size="11" font-weight="600" text-anchor="start" fill="#A00000" dominant-baseline="middle">Net effect:</text><text x="720" y="504" font-size="11" font-weight="400" text-anchor="start" fill="#111111" dominant-baseline="middle">stale state propagates -> SafetyStatus -> auto-DAMP.</text></svg>
