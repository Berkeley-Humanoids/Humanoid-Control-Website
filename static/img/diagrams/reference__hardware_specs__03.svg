<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360"
     width="920" height="360" font-family="ui-monospace, Menlo, Consolas, Courier, monospace"
     font-size="13" fill="#111111" text-rendering="geometricPrecision">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
<text x="20" y="30" font-size="15" font-weight="700" text-anchor="start" fill="#111111" dominant-baseline="middle">MIT-mode hybrid command</text>
<text x="20" y="48" font-size="11" font-weight="400" text-anchor="start" fill="#888888" dominant-baseline="middle">Same five interfaces, same torque formula across silicon, sim, mock</text><rect x="30" y="70" width="200" height="270" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="42" y="86" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">5 cmd interfaces / joint</text><rect x="50" y="100" width="160" height="32" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="130" y="108" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">position</text>
<text x="130" y="126" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">q_cmd</text><rect x="50" y="145" width="160" height="32" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="130" y="153" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">velocity</text>
<text x="130" y="171" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">qd_cmd</text><rect x="50" y="190" width="160" height="32" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="130" y="198" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">effort</text>
<text x="130" y="216" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">tau_ff</text><rect x="50" y="235" width="160" height="32" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="130" y="243" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">stiffness</text>
<text x="130" y="261" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">K_p</text><rect x="50" y="280" width="160" height="32" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="130" y="288" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">damping</text>
<text x="130" y="306" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">K_d</text><rect x="290" y="130" width="320" height="100" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
<text x="450" y="163" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">tau = K_p * (q_cmd - q)</text>
<text x="450" y="180" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">    + K_d * (qd_cmd - qd)</text>
<text x="450" y="196" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">    + tau_ff</text>
<text x="450" y="250" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">applied via mjData->qfrc_applied (sim)</text><text x="450" y="268" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">or motor firmware (real Robstride)</text><rect x="660" y="110" width="200" height="200" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="672" y="126" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">3 state interfaces / joint</text><rect x="680" y="140" width="160" height="36" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="760" y="150" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">position</text>
<text x="760" y="168" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">q</text><rect x="680" y="195" width="160" height="36" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="760" y="205" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">velocity</text>
<text x="760" y="223" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">qd</text><rect x="680" y="250" width="160" height="36" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="760" y="260" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">effort</text>
<text x="760" y="278" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">tau (meas)</text><line x1="230" y1="200" x2="290" y2="180" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="205" y="172" width="110" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="260" y="180" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">controller writes</text><line x1="610" y1="180" x2="660" y2="200" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="583" y="172" width="104" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="635" y="180" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">motor reads back</text></svg>
