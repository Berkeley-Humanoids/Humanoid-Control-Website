<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540"
     width="920" height="540" font-family="ui-monospace, Menlo, Consolas, Courier, monospace"
     font-size="13" fill="#111111" text-rendering="geometricPrecision">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
<text x="20" y="30" font-size="15" font-weight="700" text-anchor="start" fill="#111111" dominant-baseline="middle">ros2_control real-time cycle (50 Hz)</text>
<text x="20" y="48" font-size="11" font-weight="400" text-anchor="start" fill="#888888" dominant-baseline="middle">One tick = read -> update -> write</text><text x="100" y="74" font-size="12" font-weight="600" text-anchor="middle" fill="#cc4a1f" dominant-baseline="middle">controller_manager</text><line x1="100" y1="80" x2="100" y2="510" stroke="#ff6633" stroke-width="1.4" stroke-dasharray="3 3"/><text x="320" y="74" font-size="12" font-weight="600" text-anchor="middle" fill="#3B7A57" dominant-baseline="middle">Hardware plugin</text><line x1="320" y1="80" x2="320" y2="510" stroke="#3B7A57" stroke-width="1.4" stroke-dasharray="3 3"/><text x="540" y="74" font-size="12" font-weight="600" text-anchor="middle" fill="#5f6671" dominant-baseline="middle">Active controller</text><line x1="540" y1="80" x2="540" y2="510" stroke="#5f6671" stroke-width="1.4" stroke-dasharray="3 3"/><text x="770" y="74" font-size="12" font-weight="600" text-anchor="middle" fill="#A00000" dominant-baseline="middle">Bus (CAN / qfrc)</text><line x1="770" y1="80" x2="770" y2="510" stroke="#A00000" stroke-width="1.4" stroke-dasharray="3 3"/><rect x="40" y="110" width="850" height="120" fill="#ffece2" stroke="none"/><text x="880" y="130" font-size="11" font-weight="700" text-anchor="end" fill="#888888" dominant-baseline="middle">read()</text><rect x="40" y="240" width="850" height="120" fill="#eef0f2" stroke="none"/><text x="880" y="260" font-size="11" font-weight="700" text-anchor="end" fill="#888888" dominant-baseline="middle">update()</text><rect x="40" y="370" width="850" height="120" fill="#E7FFE7" stroke="none"/><text x="880" y="390" font-size="11" font-weight="700" text-anchor="end" fill="#888888" dominant-baseline="middle">write()</text><line x1="100" y1="145" x2="320" y2="145" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="150" y="118" width="120" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="210" y="127" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">read(time, period)</text><line x1="320" y1="165" x2="770" y2="165" stroke="#888888" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow-grey)"/><rect x="493" y="138" width="114" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="550" y="147" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">poll cached state</text><line x1="770" y1="195" x2="320" y2="195" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="509" y="168" width="72" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="545" y="177" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">q, qd, tau</text><line x1="320" y1="215" x2="100" y2="215" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="153" y="188" width="114" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="210" y="197" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">state_interfaces_</text><line x1="100" y1="275" x2="540" y2="275" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="254" y="248" width="132" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="320" y="257" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">update(time, period)</text><text x="540" y="305" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">read state_interfaces_,</text><text x="540" y="322" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">compute, write command_interfaces_</text><line x1="540" y1="345" x2="100" y2="345" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="287" y="318" width="66" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="320" y="327" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">return OK</text><line x1="100" y1="405" x2="320" y2="405" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="147" y="378" width="126" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="210" y="387" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">write(time, period)</text><line x1="320" y1="435" x2="770" y2="435" stroke="#888888" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow-grey)"/><rect x="472" y="408" width="156" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="550" y="417" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">stage frames (lock-free)</text><line x1="770" y1="465" x2="320" y2="465" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="530" y="438" width="30" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="545" y="447" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">ack</text><line x1="320" y1="485" x2="100" y2="485" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="177" y="458" width="66" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="210" y="467" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">return OK</text></svg>
