<line x1="970" y1="340" x2="945" y2="380" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="944" y="344" width="26" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="957" y="352" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">DDS</text><text x="520" y="80" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">Latched QoS lets a late-spawning policy runner pick up the most recent goal — no startup race.</text></svg>
