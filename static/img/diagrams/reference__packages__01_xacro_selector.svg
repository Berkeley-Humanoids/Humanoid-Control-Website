<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400"
     width="760" height="400" font-family="ui-monospace, Menlo, Consolas, Courier, monospace"
     font-size="13" fill="#111111" text-rendering="geometricPrecision">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
<text x="20" y="30" font-size="15" font-weight="700" text-anchor="start" fill="#111111" dominant-baseline="middle">lite.urdf.xacro: 3-way hardware selector</text>
<text x="20" y="48" font-size="11" font-weight="400" text-anchor="start" fill="#888888" dominant-baseline="middle">One xacro file, three target backends</text><rect x="40" y="100" width="180" height="60" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="130" y="130" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">lite.urdf.xacro</text>
<rect x="280" y="70" width="130" height="40" rx="6" ry="6" fill="#EEEEEE" stroke="#888888" stroke-width="1.5"/>
<text x="345" y="90" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">use_sim?</text>
<line x1="220" y1="130" x2="280" y2="90" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><rect x="232" y="101" width="36" height="18" rx="4" ry="4" fill="white" stroke="#888888" stroke-width="0.8"/>
<text x="250" y="110" font-size="11" font-weight="400" text-anchor="middle" fill="#111111" dominant-baseline="middle">args</text><rect x="470" y="50" width="250" height="50" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
<text x="595" y="67" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">mujoco_ros2_control/</text>
<text x="595" y="85" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">MujocoSystem</text><line x1="410" y1="80" x2="470" y2="75" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="424" y="61" width="32" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="440" y="69" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">true</text><rect x="280" y="200" width="180" height="40" rx="6" ry="6" fill="#EEEEEE" stroke="#888888" stroke-width="1.5"/>
<text x="370" y="220" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">use_fake_hardware?</text>
<line x1="345" y1="110" x2="345" y2="200" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="326" y="139" width="38" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="345" y="147" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">false</text><rect x="490" y="175" width="230" height="50" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="605" y="200" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">mock_components/GenericSystem</text>
<line x1="460" y1="215" x2="490" y2="200" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="459" y="191" width="32" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="475" y="199" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">true</text><rect x="490" y="280" width="230" height="60" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="605" y="302" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">humanoid_control_robstride/</text>
<text x="605" y="320" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">RobstrideSystem</text><line x1="370" y1="240" x2="490" y2="305" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="411" y="256" width="38" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="430" y="264" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">false</text><text x="380" y="365" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">use_sim wins over use_fake_hardware when both are true</text></svg>
