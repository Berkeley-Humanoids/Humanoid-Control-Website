<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500"
     width="1000" height="500" font-family="ui-monospace, Menlo, Consolas, Courier, monospace"
     font-size="13" fill="#111111" text-rendering="geometricPrecision">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
<text x="20" y="30" font-size="15" font-weight="700" text-anchor="start" fill="#111111" dominant-baseline="middle">Safety pipeline — fault to DAMPING in ≤1 tick</text>
<text x="20" y="48" font-size="11" font-weight="400" text-anchor="start" fill="#888888" dominant-baseline="middle">Detection (plugin) → telemetry (latched topic) → response (mode_manager)</text><rect x="40" y="70" width="280" height="380" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="52" y="86" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">Layer 1: detection (plugin)</text><rect x="360" y="70" width="240" height="380" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="372" y="86" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">Layer 2: telemetry</text><rect x="640" y="70" width="320" height="380" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="652" y="86" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">Layer 3: response</text><rect x="60" y="100" width="240" height="40" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="180" y="112" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">BUS_OFF</text>
<text x="180" y="130" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">socket open / ENETDOWN (sticky)</text><rect x="60" y="150" width="240" height="40" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="180" y="162" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">RX_TIMEOUT</text>
<text x="180" y="180" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">joint silent > rx_timeout_ms</text><rect x="60" y="200" width="240" height="40" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="180" y="212" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">TX_QUEUE_OVERRUN</text>
<text x="180" y="230" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">outbound SPSC ring full</text><rect x="60" y="250" width="240" height="40" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="180" y="262" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">MOTOR_FAULT</text>
<text x="180" y="280" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">OperationStatus.fault_bits</text><rect x="60" y="300" width="240" height="40" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="180" y="312" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">TEMPERATURE_LIMIT</text>
<text x="180" y="330" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">decoded from same frame</text><rect x="60" y="350" width="240" height="40" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="180" y="362" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">INVALID_FRAME</text>
<text x="180" y="380" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">DLC / comm-type mismatch</text><text x="180" y="405" font-size="10" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">(per-tick rebuild from current state, not history)</text><rect x="380" y="110" width="200" height="40" rx="6" ry="6" fill="#F4F4F4" stroke="#888888" stroke-width="1.5"/>
<text x="480" y="122" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">SafetyStatus</text>
<text x="480" y="140" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">humanoid_control_msgs</text><rect x="380" y="170" width="200" height="40" rx="6" ry="6" fill="#F4F4F4" stroke="#888888" stroke-width="1.5"/>
<text x="480" y="190" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">level: OK / WARN / FAULT / CRITICAL</text>
<rect x="380" y="230" width="200" height="40" rx="6" ry="6" fill="#F4F4F4" stroke="#888888" stroke-width="1.5"/>
<text x="480" y="250" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">flags: uint32 bit mask</text>
<rect x="380" y="290" width="200" height="40" rx="6" ry="6" fill="#F4F4F4" stroke="#888888" stroke-width="1.5"/>
<text x="480" y="310" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">source: 'humanoid_devices_robstride/can0'</text>
<rect x="380" y="360" width="200" height="50" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
<text x="480" y="376" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">/safety_status</text>
<text x="480" y="393" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">(TRANSIENT_LOCAL)</text>
<line x1="480" y1="270" x2="480" y2="290" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="480" y1="330" x2="480" y2="360" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><rect x="660" y="100" width="280" height="40" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="800" y="120" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">mode_manager.on_safety()</text>
<rect x="660" y="160" width="280" height="40" rx="6" ry="6" fill="#EEEEEE" stroke="#888888" stroke-width="1.5"/>
<text x="800" y="180" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">level == OK?</text>
<rect x="660" y="220" width="280" height="40" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
<text x="800" y="240" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">request_mode(Mode::Damping)</text>
<rect x="660" y="280" width="280" height="40" rx="6" ry="6" fill="#EEEEEE" stroke="#888888" stroke-width="1.5"/>
<text x="800" y="300" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">if STRICT switch fails:</text>
<rect x="660" y="330" width="280" height="40" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="800" y="350" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">request_mode(Mode::ZeroTorque)</text>
<rect x="660" y="390" width="280" height="36" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="800" y="408" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">controller_manager: switch_controller</text>
<line x1="800" y1="140" x2="800" y2="160" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="800" y1="200" x2="800" y2="220" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="778" y="210" width="44" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="800" y="218" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">non-OK</text><line x1="800" y1="260" x2="800" y2="280" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="772" y="270" width="56" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="800" y="278" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">fallback</text><line x1="800" y1="320" x2="800" y2="330" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="800" y1="370" x2="800" y2="390" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="300" y1="250" x2="380" y2="200" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="309" y="205" width="62" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="340" y="213" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">aggregate</text><line x1="580" y1="385" x2="660" y2="120" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="589" y="232" width="62" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="620" y="240" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">subscribe</text><text x="500" y="470" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">BUS_OFF is the one sticky flag — clears only on the next on_activate(), because EMI bursts shouldn't auto-recover.</text></svg>
