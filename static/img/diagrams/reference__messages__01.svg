<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480"
     width="920" height="480" font-family="ui-monospace, Menlo, Consolas, Courier, monospace"
     font-size="13" fill="#111111" text-rendering="geometricPrecision">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
<text x="20" y="30" font-size="15" font-weight="700" text-anchor="start" fill="#111111" dominant-baseline="middle">humanoid_control_msgs pub/sub topology</text>
<text x="20" y="48" font-size="11" font-weight="400" text-anchor="start" fill="#888888" dominant-baseline="middle">Who publishes / who subscribes for each of the 4 active topics</text><rect x="20" y="70" width="230" height="380" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="32" y="86" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">Publishers</text><rect x="330" y="70" width="250" height="380" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="342" y="86" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">Topics</text><rect x="660" y="70" width="240" height="380" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="672" y="86" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">Subscribers</text><rect x="35" y="100" width="200" height="40" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="135" y="120" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">StandbyController</text>
<rect x="35" y="160" width="200" height="40" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
<text x="135" y="180" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">mode_manager</text>
<rect x="35" y="220" width="200" height="40" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="135" y="240" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">Hardware plugins</text>
<rect x="35" y="280" width="200" height="40" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="135" y="300" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">Active policy ctrls</text>
<rect x="35" y="340" width="200" height="40" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
<text x="135" y="360" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">humanoid_control_policy (Python)</text>
<rect x="350" y="100" width="200" height="40" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="450" y="120" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">/standby_controller/state</text>
<rect x="350" y="160" width="200" height="40" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="450" y="180" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">/control_mode</text>
<rect x="350" y="220" width="200" height="40" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="450" y="240" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">/safety_status</text>
<rect x="350" y="280" width="200" height="40" rx="6" ry="6" fill="#E7FFE7" stroke="#3B7A57" stroke-width="1.5"/>
<text x="450" y="300" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">~/command (MITCommand)</text>
<rect x="680" y="100" width="200" height="40" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
<text x="780" y="120" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">mode_manager</text>
<rect x="680" y="160" width="200" height="40" rx="6" ry="6" fill="#EEEEEE" stroke="#888888" stroke-width="1.5"/>
<text x="780" y="180" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">diagnostics / log</text>
<rect x="680" y="220" width="200" height="40" rx="6" ry="6" fill="#FFF6DF" stroke="#FDB515" stroke-width="1.5"/>
<text x="780" y="240" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">mode_manager</text>
<rect x="680" y="280" width="200" height="40" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
<text x="780" y="300" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">RemotePolicyController</text>
<line x1="130" y1="130" x2="350" y2="130" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="130" y1="200" x2="350" y2="190" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="130" y1="270" x2="350" y2="250" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="130" y1="380" x2="350" y2="310" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="560" y1="130" x2="680" y2="130" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="560" y1="190" x2="680" y2="190" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="560" y1="250" x2="680" y2="250" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="560" y1="310" x2="680" y2="310" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><text x="460" y="460" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">/standby_controller/state uses TRANSIENT_LOCAL QoS so a late mode_manager sees the last is_finished</text></svg>
