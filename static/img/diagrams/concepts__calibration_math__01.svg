<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480"
     width="1000" height="480" font-family="ui-monospace, Menlo, Consolas, Courier, monospace"
     font-size="13" fill="#111111" text-rendering="geometricPrecision">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
<text x="20" y="30" font-size="15" font-weight="700" text-anchor="start" fill="#111111" dominant-baseline="middle">Calibration: joint frame ⇄ motor frame</text>
<text x="20" y="48" font-size="11" font-weight="400" text-anchor="start" fill="#888888" dominant-baseline="middle">Applied at the bus boundary in RobstrideSystem::read / ::write</text><rect x="40" y="70" width="920" height="150" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="52" y="86" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">read() — motor frame → joint frame</text><rect x="70" y="105" width="170" height="60" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="155" y="126" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">raw_motor_pos</text>
<text x="155" y="143" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">(rad, encoder)</text>
<rect x="290" y="105" width="240" height="60" rx="6" ry="6" fill="#eef0f2" stroke="#5f6671" stroke-width="1.5"/>
<text x="410" y="135" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">direction * (raw - homing_offset)</text>
<rect x="580" y="105" width="170" height="60" rx="6" ry="6" fill="#ffece2" stroke="#ff6633" stroke-width="1.5"/>
<text x="665" y="126" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">joint_pos</text>
<text x="665" y="143" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">(rad, URDF frame)</text>
<rect x="800" y="105" width="140" height="60" rx="6" ry="6" fill="#EEEEEE" stroke="#888888" stroke-width="1.5"/>
<text x="870" y="126" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">state_interface</text>
<text x="870" y="143" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle"><joint>/position</text>
<line x1="240" y1="135" x2="290" y2="135" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="530" y1="135" x2="580" y2="135" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="750" y1="135" x2="800" y2="135" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><text x="580" y="185" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">qd and tau use the same direction, NO offset (derivatives).</text><rect x="40" y="240" width="920" height="150" rx="8" ry="8" fill="#EEEEEE" stroke="#888888" stroke-width="1" stroke-dasharray="5 3"/>
<text x="52" y="256" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">write() — joint frame → motor frame</text><rect x="70" y="275" width="170" height="60" rx="6" ry="6" fill="#EEEEEE" stroke="#888888" stroke-width="1.5"/>
<text x="155" y="296" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">command_interface</text>
<text x="155" y="313" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle"><joint>/position</text>
<rect x="290" y="275" width="240" height="60" rx="6" ry="6" fill="#eef0f2" stroke="#5f6671" stroke-width="1.5"/>
<text x="410" y="305" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">direction * joint + homing_offset</text>
<rect x="580" y="275" width="170" height="60" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="665" y="305" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">raw_motor_cmd</text>
<rect x="800" y="275" width="140" height="60" rx="6" ry="6" fill="#FFE7E7" stroke="#A00000" stroke-width="1.5"/>
<text x="870" y="296" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">CAN frame</text>
<text x="870" y="313" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">(MIT-mode)</text>
<line x1="240" y1="305" x2="290" y2="305" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="530" y1="305" x2="580" y2="305" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><line x1="750" y1="305" x2="800" y2="305" stroke="#111111" stroke-width="1.4" marker-end="url(#arrow)"/><text x="60" y="420" font-size="12" font-weight="600" text-anchor="start" fill="#111111" dominant-baseline="middle">Constants per joint:</text><rect x="220" y="405" width="230" height="36" rx="6" ry="6" fill="#ffece2" stroke="#ff6633" stroke-width="1.5"/>
<text x="335" y="415" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">direction (URDF)</text>
<text x="335" y="433" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">wiring fact, same per robot model</text><rect x="470" y="405" width="250" height="36" rx="6" ry="6" fill="#eef0f2" stroke="#5f6671" stroke-width="1.5"/>
<text x="595" y="415" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">homing_offset (calibration.json)</text>
<text x="595" y="433" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">per physical robot, regenerated</text></svg>
