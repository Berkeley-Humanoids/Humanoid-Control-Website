<rect x="575" y="139" width="80" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="615" y="147" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">CAN @ 1 Mbit</text><text x="450" y="310" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">On real hardware the humanoid_control_robstride plugin owns both buses; from the controller's perspective the 17 joints are one flat list.</text></svg>
