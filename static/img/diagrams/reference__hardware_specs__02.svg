<text x="20" y="48" font-size="11" font-weight="400" text-anchor="start" fill="#888888" dominant-baseline="middle">2 CAN-USB adapters, one per arm; neck shares can0</text><rect x="40" y="80" width="200" height="60" rx="6" ry="6" fill="#E7F0FF" stroke="#003262" stroke-width="1.5"/>
