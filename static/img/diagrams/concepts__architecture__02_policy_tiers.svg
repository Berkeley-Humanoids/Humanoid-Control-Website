<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560"
     width="960" height="560" font-family="ui-monospace, Menlo, Consolas, Courier, monospace"
     font-size="13" fill="#111111" text-rendering="geometricPrecision">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
<text x="24" y="30" font-size="15" font-weight="700" text-anchor="start" fill="#111111" dominant-baseline="middle">Policy execution: System 0 (in-process, real-time)</text>
<text x="24" y="48" font-size="11" font-weight="400" text-anchor="start" fill="#888888" dominant-baseline="middle">Learned policies run in the RT loop; heavy deps confined to a launch-time prepare step</text><rect x="24" y="64" width="300" height="140" rx="8" ry="8" fill="#eef0f2" stroke="#5f6671" stroke-width="1" stroke-dasharray="5 3"/>
<text x="36" y="80" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">Launch-time prepare (non-RT, Python)</text><rect x="44" y="104" width="260" height="80" rx="6" ry="6" fill="white" stroke="#5f6671" stroke-width="1.5"/>
<text x="174" y="127" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">humanoid_control_policy / pianist_policy</text>
<text x="174" y="144" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">prepare</text>
<text x="174" y="162" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">resolve ONNX -> .mcap + overlay</text><rect x="360" y="64" width="576" height="252" rx="8" ry="8" fill="#ffece2" stroke="#ff6633" stroke-width="1" stroke-dasharray="5 3"/>
<text x="372" y="80" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">System 0  -  RLPolicyController  (C++, real-time update())</text><rect x="380" y="104" width="252" height="58" rx="6" ry="6" fill="white" stroke="#ff6633" stroke-width="1.5"/>
<text x="506" y="125" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">ObservationManager</text>
<text x="506" y="143" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">built-in + .mcap ref + extern</text><rect x="664" y="104" width="252" height="58" rx="6" ry="6" fill="white" stroke="#ff6633" stroke-width="1.5"/>
<text x="790" y="125" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">OnnxPolicy</text>
<text x="790" y="143" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">onnxruntime C++ (opt-in)</text><rect x="380" y="184" width="252" height="58" rx="6" ry="6" fill="white" stroke="#ff6633" stroke-width="1.5"/>
<text x="506" y="205" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">ReferenceProvider</text>
<text x="506" y="223" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">McapTracking / McapPiano</text><rect x="664" y="184" width="252" height="58" rx="6" ry="6" fill="white" stroke="#ff6633" stroke-width="1.5"/>
<text x="790" y="205" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">ActionMapper</text>
<text x="790" y="223" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">decode + scatter -> full joints</text><line x1="506" y1="184" x2="506" y2="162" stroke="#ff6633" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="632" y1="133" x2="664" y2="133" stroke="#ff6633" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="790" y1="162" x2="790" y2="184" stroke="#ff6633" stroke-width="1.4" marker-end="url(#arrow-grey)"/><line x1="324" y1="134" x2="360" y2="134" stroke="#5f6671" stroke-width="1.4" marker-end="url(#arrow-grey)"/>
<rect x="311" y="118" width="62" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="342" y="126" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">at launch</text><rect x="24" y="232" width="320" height="72" rx="6" ry="6" fill="#F4F4F4" stroke="#888888" stroke-width="1.5"/>
<text x="184" y="260" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">Per-tick inputs</text>
<text x="184" y="278" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">state interfaces | /imu/data | /piano/key_state</text><line x1="344" y1="268" x2="380" y2="133" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow-grey)"/><rect x="610" y="392" width="290" height="52" rx="6" ry="6" fill="#EEEEEE" stroke="#888888" stroke-width="1.5"/>
<text x="755" y="410" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">5 MIT command interfaces / joint</text>
<text x="755" y="428" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">K, D, q_cmd, qd_cmd, tau_ff -> bus</text><line x1="790" y1="242" x2="755" y2="392" stroke="#ff6633" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow-grey)"/><rect x="24" y="344" width="470" height="150" rx="8" ry="8" fill="#eef0f2" stroke="#5f6671" stroke-width="1" stroke-dasharray="5 3"/>
<text x="36" y="360" font-size="11" font-weight="600" text-anchor="start" fill="#888888" dominant-baseline="middle">System 1/2 ingress (non-RT, out-of-process)</text><rect x="44" y="392" width="180" height="60" rx="6" ry="6" fill="white" stroke="#5f6671" stroke-width="1.5"/>
<text x="134" y="414" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">External source</text>
<text x="134" y="432" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">gravity-comp / VLA</text><rect x="300" y="392" width="174" height="60" rx="6" ry="6" fill="white" stroke="#5f6671" stroke-width="1.5"/>
<text x="387" y="414" font-size="13" font-weight="600" text-anchor="middle" fill="#111111" dominant-baseline="middle">RemotePolicyController</text>
<text x="387" y="432" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">C++</text><line x1="224" y1="422" x2="300" y2="422" stroke="#5f6671" stroke-width="1.4" marker-end="url(#arrow-grey)"/>
<rect x="210" y="406" width="104" height="16" rx="3" ry="3" fill="white" stroke="none"/>
<text x="262" y="414" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">MITCommand / DDS</text><line x1="474" y1="422" x2="610" y2="418" stroke="#5f6671" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow-grey)"/><text x="755" y="464" font-size="11" font-weight="400" text-anchor="middle" fill="#888888" dominant-baseline="middle">one active at a time (FSM-selected)</text></svg>
